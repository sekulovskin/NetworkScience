[workspace]
name = "network-science-summer-school"
version = "2026.0.0"
description = "Python environment for the Network Science summer school practicals."
channels = ["conda-forge"]
platforms = ["osx-arm64", "osx-64", "linux-64", "win-64"]

[dependencies]
python = ">=3.11,<3.13"
cairocffi = "*"
python-igraph = "*"
ipykernel = "*"
ipython = "*"
jupyter_core = "*"
jupyterlab = "*"
matplotlib = "*"
networkx = "*"
notebook = "*"
numba = "*"
numpy = "*"
pandas = "*"
pycairo = "*"
scikit-learn = "*"
scipy = "*"
seaborn = "*"

[tasks]
lab = "jupyter lab"
notebook = "jupyter notebook"
