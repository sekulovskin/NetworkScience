name: network-science-summer-school
channels:
  - conda-forge
dependencies:
  # Binder/repo2docker needs an exact Python version here; ranges are treated as unspecified.
  - python=3.11
  - cairocffi
  - python-igraph
  - ipykernel
  - ipython
  - jupyter_core
  - jupyterlab
  - matplotlib
  - networkx
  - notebook
  - numba
  - numpy
  - pandas
  - pycairo
  - scikit-learn
  - scipy
  - seaborn
